services:
  postgres:
    image: postgres:16
    container_name: finsight-postgres
    environment:
      POSTGRES_DB: finsight_ai
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight123
    ports:
      - "5432:5432"
    volumes:
      - finsight_pg_data:/var/lib/postgresql/data

volumes:
  finsight_pg_data: